<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECLIPSE - Music Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <div class="app-layout">

        <!-- BARRA LATERAL -->
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo-eclipse">
                    <img src="logo.png" alt="Logo Eclipse" class="mi-logo-img">
                </div>
                <div class="logo-text">
                    <h1>ECLIPSE</h1>
                    <p>MUSIC PLAYER</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li><a href="#" class="neon-btn">Principal</a></li>
                    <li><a href="#" class="neon-btn">Explorar</a></li>
                    <li><a href="#" class="neon-btn">Tu Biblioteca</a></li>
                </ul>
            </nav>
        </aside>
          
        <!-- CONTENIDO PRINCIPAL -->
        <main class="player-visual">
            
            <!-- BARRA DE BÚSQUEDA -->
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Busca en tu biblioteca local (canción, artista)...">
            </div>
            
            <!-- BOTONES DE GÉNERO -->
            <div class="genre-filters">
                <button class="genre-btn active" data-genero="Todos">Todos</button>
                <button class="genre-btn" data-genero="Reggaeton">Reggaeton</button>
                <button class="genre-btn" data-genero="Ingles">Inglés</button>
                <button class="genre-btn" data-genero="Bachata">Bachata</button>
                <button class="genre-btn" data-genero="Salsa">Salsa</button>
            </div>
             
            <!-- SECCIÓN DE RESULTADOS DE BÚSQUEDA -->
            <section id="search-results-section" style="display: none; width: 100%;">
                <h2 style="font-size: 1.3rem; margin-bottom: 15px; border-bottom: 1px solid rgba(176, 102, 254, 0.3); padding-bottom: 8px;">Resultados de Búsqueda</h2>
                <div class="carousel-container" id="search-results-track" style="flex-wrap: wrap; overflow-x: visible;"></div>
            </section>

            <!-- SECCIONES DE MÚSICA ESTILO SPOTIFY -->
            <div class="home-sections" id="home-sections">
                <section class="music-row">
                    <h2>Acceso Rápido</h2>
                    <div class="carousel-container" id="acceso-rapido-track"></div>
                </section>
            
                <section class="music-row">
                    <h2>Más Sonadas</h2>
                    <div class="carousel-container" id="mas-sonadas-track"></div>
                </section>
            
                <section class="music-row">
                    <h2>Recomendadas</h2>
                    <div class="carousel-container" id="recomendadas-track"></div>
                </section>
            </div>

            <!-- REPRODUCTOR DE AUDIO NATIVO (REQUERIDO POR JS) -->
            <audio id="html5-player"></audio>
            
            <!-- BARRA DE REPRODUCCIÓN FIJA -->
            <div class="bottom-player" id="bottom-player">
                <div class="close-player-btn" id="close-player">&#9660;</div>
                
                <div class="now-playing" id="now-playing-area">
                    <img src="https://via.placeholder.com/150/2a1b4e/ffffff?text=ECLIPSE" alt="Portada" id="now-playing-img">
                    <div class="now-playing-info">
                        <h4 id="now-playing-title">Selecciona una pista</h4>
                        <p id="now-playing-artist">ECLIPSE Player</p>
                    </div>
                </div>
                
                <div class="player-center">
                    <div class="player-controls">
                        <div class="ctrl-icon" id="shuffle-btn" title="Aleatorio">&#8644;</div> 
                        <div class="ctrl-icon" id="prev-btn">&#9664;&#9664;</div>
                        <div class="central-play-glow">
                           <div class="central-play-btn" id="central-play">&#9658;</div>
                        </div>
                        <div class="ctrl-icon" id="next-btn">&#9654;&#9654;</div>
                        <div class="ctrl-icon" id="repeat-btn" title="Repetir">&#10227;</div>
                    </div>
                    <div class="progress-container" id="progress-container">
                        <span class="time" id="current-time">0:00</span>
                        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                        <span class="time" id="total-time">0:00</span>
                    </div>
                </div>
                
                <!-- PANEL DE LA COLA -->
                <div class="queue-panel" id="queue-panel">
                    <h3>Cola de Reproducción</h3>
                    <div class="queue-list" id="queue-list"></div>
                </div>
                 
                <div class="player-right">
                    <div class="volume-container">
                        <span class="ctrl-icon" title="Volumen">&#128266;</span>
                        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                    </div>
                    <div class="ctrl-icon" id="queue-btn" title="Ver lista">&#9776;</div>
                </div>
            </div> 
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
